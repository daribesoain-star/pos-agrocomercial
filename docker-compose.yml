version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_agrocomercial
      POSTGRES_USER: pos_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pos_schema_v1.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_admin -d pos_agrocomercial"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache + sessions + sync queue) ──
  redis:
    image: redis:7-alpine
    container_name: pos-redis
    restart: unless-stopped
    # Contraseña requerida (no exponer Redis sin auth)
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_production} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Fastify ──
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pos-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://pos_admin:${DB_PASSWORD:-changeme_in_production}@postgres:5432/pos_agrocomercial
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_in_production}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      KAME_BASE_URL: https://api.kameone.cl/api/
      KAME_AUTH0_DOMAIN: ${KAME_AUTH0_DOMAIN}
      KAME_CLIENT_ID: ${KAME_CLIENT_ID}
      KAME_CLIENT_SECRET: ${KAME_CLIENT_SECRET}
      KAME_AUDIENCE: ${KAME_AUDIENCE}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No correr como root
    user: "1000:1000"

  # ── Frontend Next.js ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    user: "1000:1000"

volumes:
  pgdata:
  redisdata:
